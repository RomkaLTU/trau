name: ci
on:
  pull_request:
  push:
    branches: [main, "epic/**"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make vet
      # The Makefile pins CGO_ENABLED=0 for static builds, but -race needs cgo
      # on Linux; a make command-line override beats the Makefile's export.
      - run: make test CGO_ENABLED=1
